# This file stores configurations for your Shopify app.

client_id = "c8e7076def1723e9d26b004da69cd8b7"
name = "CustomerPanel AI"
application_url = "https://dev.auctovio.com"
embedded = true

[auth]
redirect_urls = [
  "https://dev.auctovio.com/auth/callback",
  "https://dev.auctovio.com/auth/shopify/callback",
  "https://dev.auctovio.com/shopify/auth/callback"
]

[access_scopes]
# read_products: fetch product data for analysis
# read_orders: used for shop-type classification
scopes = "read_products,read_orders"

[webhooks]
api_version = "2024-10"

  # Handled by: /app/routes/webhooks.app.uninstalled.tsx
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  # Handled by: /app/routes/webhooks.app.scopes_update.tsx
  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  # Webhooks can have filters
  # Only receive webhooks for product updates with a product price >= 10.00
  # See: https://shopify.dev/docs/apps/build/webhooks/customize/filters
  # [[webhooks.subscriptions]]
  # topics = ["products/update"]
  # uri = "/webhooks/products/update"
  # filter = "variants.price:>=10.00"

  # Mandatory GDPR compliance webhooks — required for App Store approval
  # See: https://shopify.dev/docs/apps/build/privacy-law-compliance
  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = ["customers/data_request"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = ["customers/redact"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = ["shop/redact"]

[build]
automatically_update_urls_on_dev = true
