services:

  # ── Ollama — local LLM inference (free, CPU mode) ───────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cp_ollama
    ports:
      - "11434:11434"
    volumes:
      - H:/Dev/DockerStorage/models:/root/.ollama   # models stored on H: drive
    environment:
      - OLLAMA_KEEP_ALIVE=24h                   # keep model loaded in RAM between calls
      - OLLAMA_NUM_PARALLEL=2                   # max 2 concurrent inference requests
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  # ── MiroFish Engine — CustomerPanel AI debate engine ────────────────────────
  engine:
    build:
      context: ./packages/engine
      dockerfile: Dockerfile.dev
    container_name: cp_engine
    ports:
      - "8000:8000"
    volumes:
      - ./packages/engine/backend:/app/backend  # live reload during dev
      - H:/Dev/DockerStorage/logs:/app/logs
    environment:
      # ── Primary LLM: Groq (llama-3.1-70b-versatile) ──────────────────────────
      # Free tier: ~6,000 TPM, ~30 RPM, ~500 RPD
      # LLM_RPM=5 → 12s between calls, stays under TPM ceiling (~600 tok/call)
      - LLM_API_KEY=${GROQ_API_KEY}
      - LLM_BASE_URL=https://api.groq.com/openai/v1
      - LLM_MODEL_NAME=llama-3.1-8b-instant
      - LLM_RPM=10          # 6s gap between calls — eliminates Groq burst-limit 429s
      # ── Fallback LLM: Gemini 1.5 Flash ───────────────────────────────────────
      # Activated automatically when Groq returns 429 after 3 retries.
      - FALLBACK_LLM_API_KEY=${GOOGLE_AI_API_KEY}
      - FALLBACK_LLM_BASE_URL=https://generativelanguage.googleapis.com/v1beta/openai/
      - FALLBACK_LLM_MODEL_NAME=gemini-1.5-flash
      - ZEP_API_KEY=${ZEP_API_KEY}
      - ENGINE_API_KEY=${ENGINE_SECRET}
      - SHOPIFY_APP_API_KEY=${ENGINE_SECRET}
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=8000
      - FLASK_DEBUG=true
      - SECRET_KEY=${ENGINE_SECRET}
      # Skip dynamic archetype generation to save ~5 calls per simulation.
      - SKIP_ARCHETYPE_GEN=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/miroshop/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Redis — simulation queue + MT budget counters ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cp_redis
    ports:
      - "6379:6379"
    volumes:
      - H:/Dev/DockerStorage/redis:/data            # persist queue state on H: drive
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── cloudflared tunnel is run externally via named tunnel (auctovio-dev) ────
  # engine.auctovio.com → localhost:8000
  # dev.auctovio.com    → localhost:3457  (Shopify app)
  # Run: cloudflared tunnel run auctovio-dev
